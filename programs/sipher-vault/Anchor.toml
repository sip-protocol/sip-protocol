[toolchain]
anchor_version = "0.30.1"
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
sipher_vault = "11111111111111111111111111111111"

[programs.devnet]
sipher_vault = "11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
